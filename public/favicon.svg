<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Glossa: a slide (rounded 16:9-ish card in the app's accent periwinkle)
       carrying an original line above a translated line. The lower bar uses the
       same gold as DEFAULT_TRANSLATION_TEXT_COLOR in src/types/song.ts, so the
       tab icon and the slides it produces share a palette. Two bars rather than
       a letterform because that stays legible down at 16px. -->
  <rect width="64" height="64" rx="14" fill="#5f74b0"/>
  <rect x="14" y="21" width="36" height="8" rx="4" fill="#ffffff"/>
  <rect x="19" y="35" width="26" height="8" rx="4" fill="#ffd27a"/>
</svg>
